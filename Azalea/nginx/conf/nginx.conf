worker_processes  1;

pid /app/nginx/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    sendfile        on;

    keepalive_timeout  65;

    client_max_body_size 0;  # unlimited
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; proload";
    add_header Content-Security-Policy "frame-ancestors 'self'";

    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn perip 1000;
    limit_rate 200m;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;

    error_log             /app/pv/logs/nginx_error.log warn;
    access_log            /app/pv/logs/nginx_access.log combined;
    client_body_temp_path /app/nginx/tmp/client_body;
    proxy_temp_path       /app/nginx/tmp/proxy;
    fastcgi_temp_path     /app/nginx/tmp/fastcgi;
    uwsgi_temp_path       /app/nginx/tmp/uwsgi;
    scgi_temp_path        /app/nginx/tmp/scgi;

    server {
        listen 9001 ssl;
        listen 127.0.0.1:9001 ssl;
        listen [::]:9001 ssl ipv6only=on;
        ssl_certificate ../ssl/cacert.pem;
        ssl_certificate_key ../ssl/privkey.pem;
        server_name  -;
        ssl_protocols TLSv1.2;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
        ssl_prefer_server_ciphers on;
        client_max_body_size 0;
        charset utf-8;
        proxy_set_header X-Real-Ip $remote_addr;
        proxy_set_header Origin https://127.0.0.1:9001;

        # if ( $http_host !~ ".:9001$" )
        # {
        #     return 403;
        # }

        if ($request_method !~ ^(GET|POST|HEAD)$ ) {
            return 403;
        }

        root /app/common_static/;

        location / {
            expires 1h;
            index index.html;
            add_header Cache-Control private;
            add_header X-Frame-Options SAMEORIGIN;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; proload";
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            gzip on;
            gzip_comp_level 6;
            gzip_vary on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            try_files $uri $uri/ /index.html;
        }

        location ~* (zh|en|menu)\.json {
            types { } default_type text/html;
            root /app/common_static/;
        }

        location /script/ {
            proxy_request_buffering off;
            proxy_pass http://127.0.0.1:9002/script/;
            proxy_buffering off;
            proxy_cache off;
        }

        location /websocket {
            proxy_pass http://127.0.0.1:9003/check;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
       }

        if ($http_X_HTTP_Method ~* 'GET|PUT|DELETE|HEAD') {
            return 405;
        }
        if ($http_X_HTTP_Method_Override ~* 'GET|PUT|DELETE|HEAD') {
            return 405;
        }
        if ($http_X_Method_Override ~* 'GET|PUT|DELETE|HEAD') {
            return 405;
        }
        if ($args  ~* _method) {
            return 405;
        }
        if ($http_origin ~* '\.com') {
            return 405;
        }
        if ($content_type ~* 'application/xml') {
            return 505;
        }
        if ($request_uri ~* .*[\\x00-\x1f]+.*) {
            return 435;
        }
        if ($request_uri ~* .*[\\x7f]+.*) {
           return 435;
        }

        location ~ ^/upload/.*.(tar|zip)$ {
            deny all;
        }

        location ~ \.\. {
            deny all;
        }

        # 阻止访问所有隐藏文件（以.开头）
        location ~ /\. {
            deny all;                # 拒绝所有请求
            access_log off;           # 不记录访问日志
            log_not_found off;        # 不记录404错误日志
            return 404;               # 返回404而非403
        }

        proxy_intercept_errors on ;

        error_page 413 /413.html;
        location =/413.html {
            alias /app/nginx/html/413.html;
        }

        error_page 502 /502.html;
        location =/502.html {
            alias /app/nginx/html/502.html;
        }

        error_page 504 /504.html;
        location =/504.html {
            alias /app/nginx/html/504.html;
        }
    }

    include /app/pv/etc/nginx.d/*.conf;
}
